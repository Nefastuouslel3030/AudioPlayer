<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audio Master Pro - Premium UI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0e0e0e; 
            --panel: #1a1a1a; 
            --text: #e0e0e0; 
            --btn-hover: #2a2a2a;
        }
        
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            grid-template-rows: 200px 1fr 120px;
            gap: 15px; padding: 15px; height: 100vh; box-sizing: border-box;
        }

        /* Visualizador */
        #visualizer-container { grid-column: 1 / 3; background: #000; border-radius: 12px; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        /* EQ Paramétrico */
        .eq-panel { background: var(--panel); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
        .eq-controls { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; flex: 1; align-items: center; }
        .param-group { background: #222; padding: 15px 5px; border-radius: 8px; text-align: center; }
        .param-group label { font-size: 10px; color: var(--accent); display: block; margin-bottom: 10px; font-weight: bold; }
        input[type="range"] { accent-color: var(--accent); cursor: pointer; }

        /* Sidebar: Cover & Playlist */
        .sidebar { background: var(--panel); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .cover-container { 
            width: 100%; aspect-ratio: 1/1; background: #222; 
            display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center; border-bottom: 2px solid #222;
        }
        #trackList { flex: 1; overflow-y: auto; padding: 10px; }
        .track { 
            padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 4px;
            font-size: 13px; transition: 0.2s; border-left: 0px solid var(--accent);
        }
        .track:hover { background: var(--btn-hover); }
        .track.playing { background: #111; border-left: 4px solid var(--accent); color: var(--accent); }

        /* Player Bar */
        .player-bar { 
            grid-column: 1 / 3; background: var(--panel); border-radius: 12px; 
            display: flex; align-items: center; padding: 0 20px; gap: 15px;
        }

        /* Iconos Personalizados */
        .btn-icon {
            width: 40px; height: 40px; background: none; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
            transition: 0.3s; padding: 8px;
        }
        .btn-icon:hover { background: var(--btn-hover); }
        .btn-icon img { width: 100%; height: 100%; object-fit: contain; filter: invert(1); }
        .btn-icon.active { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent); }
        .btn-icon.active img { filter: invert(80%) sepia(100%) saturate(1000%) hue-rotate(140deg); }

        .progress-container { flex: 1; display: flex; align-items: center; gap: 10px; }
        #progressBar { flex: 1; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="visualizer-container"><canvas id="visualizer"></canvas></div>

    <div class="eq-panel">
        <h4 style="margin:0 0 15px 0; font-size: 12px; letter-spacing: 2px; color: var(--accent)">PARAMETRIC EQUALIZER</h4>
        <div class="eq-controls" id="eq-controls"></div>
    </div>

    <div class="sidebar">
        <div id="coverArt" class="cover-container">
            <img id="placeholder-icon" src="https://cdn-icons-png.flaticon.com/512/263/263103.png" style="width:50px; opacity:0.2; filter:invert(1)">
        </div>
        <div style="padding: 10px; border-bottom: 1px solid #333;">
            <input type="file" id="fileInput" multiple accept="audio/*" style="display:none">
            <button class="btn-icon" style="width: auto; border-radius: 4px; font-size: 11px; color: white;" onclick="document.getElementById('fileInput').click()">
                + ADD TRACKS
            </button>
        </div>
        <div id="trackList"></div>
    </div>

    <div class="player-bar">
        <button class="btn-icon" id="shuffleBtn" title="Mezclar">
            <img src="https://cdn-icons-png.flaticon.com/512/724/724945.png">
        </button>

        <button class="btn-icon" id="prevBtn"><img src="https://cdn-icons-png.flaticon.com/512/318/318477.png"></button>
        <button class="btn-icon" id="playBtn" style="width:55px; height:55px;"><img id="playIcon" src="https://cdn-icons-png.flaticon.com/512/318/318476.png"></button>
        <button class="btn-icon" id="nextBtn"><img src="https://cdn-icons-png.flaticon.com/512/318/318475.png"></button>

        <button class="btn-icon" id="repeatBtn" title="Repetir">
            <img id="repeatIcon" src="https://cdn-icons-png.flaticon.com/512/702/702132.png">
        </button>

        <div class="progress-container">
            <span id="curTime" style="font-size:11px; width:40px">0:00</span>
            <input type="range" id="progressBar" value="0" min="0" step="0.1">
            <span id="durTime" style="font-size:11px; width:40px">0:00</span>
        </div>

        <div style="display:flex; align-items:center; gap:8px; width: 120px;">
            <img src="https://cdn-icons-png.flaticon.com/512/727/727269.png" style="width:15px; filter:invert(1)">
            <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.7">
        </div>
    </div>
</div>

<script>
    const jsmediatags = window.jsmediatags;
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioContext.createAnalyser();
    const gainNode = audioContext.createGain();
    const audioEle = new Audio();
    
    let source = null;
    let playlist = [];
    let currentIndex = 0;
    let filters = [];
    
    // Estados
    let isShuffle = false;
    let repeatMode = 0; // 0: Off, 1: All, 2: One

    const ICON_REPEAT_ALL = "https://cdn-icons-png.flaticon.com/512/702/702132.png";
    const ICON_REPEAT_ONE = "https://cdn-icons-png.flaticon.com/512/3580/3580382.png";
    const ICON_PLAY = "https://cdn-icons-png.flaticon.com/512/318/318476.png";
    const ICON_PAUSE = "https://cdn-icons-png.flaticon.com/512/61/61180.png";

    // --- SETUP AUDIO ---
// --- SETUP AUDIO CORREGIDO ---
function setupAudio() {
    if (!source) {
        source = audioContext.createMediaElementSource(audioEle);
        let lastNode = source;

        // 1. Conectar los filtros del Ecualizador
        const bands = [
            { f: 60, type: 'lowshelf', label: 'BASS' },
            { f: 400, type: 'peaking', label: 'LOW-MID' },
            { f: 1000, type: 'peaking', label: 'MID' },
            { f: 4500, type: 'peaking', label: 'HIGH-MID' },
            { f: 12000, type: 'highshelf', label: 'TREBLE' }
        ];

        bands.forEach((band, i) => {
            const f = audioContext.createBiquadFilter();
            f.type = band.type; 
            f.frequency.value = band.f; 
            f.gain.value = 0;
            lastNode.connect(f); 
            lastNode = f; 
            filters.push(f);

            // UI del EQ
            const div = document.createElement('div');
            div.className = 'param-group';
            div.innerHTML = `<label>${band.label}</label>
                <input type="range" min="-15" max="15" value="0" oninput="filters[${i}].gain.value=this.value">`;
            document.getElementById('eq-controls').appendChild(div);
        });

        // 2. Conectar al GainNode (Volumen) después del EQ
        lastNode.connect(gainNode);

        // 3. Conectar el Analyser DESPUÉS del Volumen
        // Ahora el visualizador recibirá la señal ya procesada y atenuada
        gainNode.connect(analyser);

        // 4. Finalmente a los altavoces
        analyser.connect(audioContext.destination);
    }
}

    // --- LOGICA DE REPRODUCCIÓN ---
    function playTrack(index) {
        if (playlist.length === 0) return;
        setupAudio();
        currentIndex = index;
        audioEle.src = playlist[currentIndex].url;
        audioEle.play();
        if(audioContext.state === 'suspended') audioContext.resume();
        
        loadMetadata(playlist[currentIndex].raw);
        renderPlaylist();
    }

    function nextTrack() {
        if (isShuffle) {
            playTrack(Math.floor(Math.random() * playlist.length));
        } else {
            let next = currentIndex + 1;
            if (next >= playlist.length) {
                if (repeatMode === 1) playTrack(0); // Repeat All
                else audioEle.pause();
            } else {
                playTrack(next);
            }
        }
    }

    audioEle.onended = () => {
        if (repeatMode === 2) playTrack(currentIndex); // Repeat One
        else nextTrack();
    };

    // --- BOTONES ---
    document.getElementById('playBtn').onclick = () => {
        if (audioEle.paused) audioEle.play(); else audioEle.pause();
    };

    audioEle.onplay = () => document.getElementById('playIcon').src = ICON_PAUSE;
    audioEle.onpause = () => document.getElementById('playIcon').src = ICON_PLAY;

    document.getElementById('nextBtn').onclick = nextTrack;
    document.getElementById('prevBtn').onclick = () => playTrack((currentIndex - 1 + playlist.length) % playlist.length);

    document.getElementById('shuffleBtn').onclick = (e) => {
        isShuffle = !isShuffle;
        document.getElementById('shuffleBtn').classList.toggle('active', isShuffle);
    };

    document.getElementById('repeatBtn').onclick = () => {
        repeatMode = (repeatMode + 1) % 3;
        const btn = document.getElementById('repeatBtn');
        const img = document.getElementById('repeatIcon');
        
        if (repeatMode === 0) {
            btn.classList.remove('active');
            img.src = ICON_REPEAT_ALL;
        } else if (repeatMode === 1) {
            btn.classList.add('active');
            img.src = ICON_REPEAT_ALL;
        } else {
            btn.classList.add('active');
            img.src = ICON_REPEAT_ONE;
        }
    };

    // --- METADATOS Y UI ---
    function loadMetadata(file) {
        const cover = document.getElementById('coverArt');
        cover.style.backgroundImage = 'none';
        document.getElementById('placeholder-icon').style.display = 'block';

        jsmediatags.read(file, {
            onSuccess: (tag) => {
                const { data, format } = tag.tags.picture || {};
                if (data) {
                    const base64String = data.reduce((acc, cur) => acc + String.fromCharCode(cur), "");
                    cover.style.backgroundImage = `url(data:${format};base64,${window.btoa(base64String)})`;
                    document.getElementById('placeholder-icon').style.display = 'none';
                }
            }
        });
    }

    document.getElementById('fileInput').onchange = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(f => playlist.push({ name: f.name, url: URL.createObjectURL(f), raw: f }));
        renderPlaylist();
        if (audioEle.paused && !audioEle.src) playTrack(0);
    };

    function renderPlaylist() {
        const list = document.getElementById('trackList');
        list.innerHTML = '';
        playlist.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `track ${i === currentIndex ? 'playing' : ''}`;
            div.innerHTML = `<b>${i+1}</b> ${t.name.slice(0,35)}`;
            div.onclick = () => playTrack(i);
            list.appendChild(div);
        });
    }

    // --- VISUALIZADOR ---
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    function draw() {
        requestAnimationFrame(draw);
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        const barWidth = (canvas.width / dataArray.length) * 2.5;
        let x = 0;
        for(let i=0; i<dataArray.length; i++) {
            let h = (dataArray[i]/255) * canvas.height;
            ctx.fillStyle = `hsl(${180 + (i/dataArray.length)*100}, 100%, 50%)`;
            ctx.fillRect(x, canvas.height - h, barWidth-1, h);
            x += barWidth;
        }
    }

    // Progress bar
    audioEle.ontimeupdate = () => {
        const p = (audioEle.currentTime / audioEle.duration) * 100 || 0;
        document.getElementById('progressBar').value = p;
        document.getElementById('curTime').innerText = formatTime(audioEle.currentTime);
        document.getElementById('durTime').innerText = formatTime(audioEle.duration);
    };
    document.getElementById('progressBar').oninput = (e) => audioEle.currentTime = (e.target.value/100) * audioEle.duration;
    document.getElementById('volSlider').oninput = (e) => gainNode.gain.value = e.target.value;
    function formatTime(s) { return isNaN(s) ? "0:00" : Math.floor(s/60) + ":" + Math.floor(s%60).toString().padStart(2,'0'); }

    draw();
</script>
</body>
</html>
